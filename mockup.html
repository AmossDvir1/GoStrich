<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GoStrich - Animation & UI Redesign</title>
    <style>
      body {
        background: #94a3b8;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 40px;
      }
      .mockup-container {
        max-width: 1000px;
        width: 100%;
        filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.15));
      }
    </style>
  </head>
  <body>
    <div class="mockup-container">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="-20 -20 890 890"
        width="100%"
        height="100%"
      >
        <defs>
          <!-- Shadows -->
          <filter id="shadow-card" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow
              dx="0"
              dy="-10"
              stdDeviation="15"
              flood-color="#000000"
              flood-opacity="0.05"
            />
          </filter>
          <filter
            id="shadow-card-dark"
            x="-10%"
            y="-10%"
            width="120%"
            height="120%"
          >
            <feDropShadow
              dx="0"
              dy="-10"
              stdDeviation="15"
              flood-color="#000000"
              flood-opacity="0.3"
            />
          </filter>

          <filter
            id="shadow-widget"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%"
          >
            <feDropShadow
              dx="0"
              dy="4"
              stdDeviation="6"
              flood-color="#000000"
              flood-opacity="0.08"
            />
          </filter>
          <filter
            id="shadow-widget-dark"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%"
          >
            <feDropShadow
              dx="0"
              dy="4"
              stdDeviation="6"
              flood-color="#000000"
              flood-opacity="0.4"
            />
          </filter>

          <filter id="shadow-btn" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow
              dx="0"
              dy="8"
              stdDeviation="10"
              flood-color="#10B981"
              flood-opacity="0.3"
            />
          </filter>
          <filter
            id="shadow-btn-danger"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%"
          >
            <feDropShadow
              dx="0"
              dy="8"
              stdDeviation="10"
              flood-color="#EF4444"
              flood-opacity="0.3"
            />
          </filter>

          <filter id="glow-marker">
            <feDropShadow
              dx="0"
              dy="0"
              stdDeviation="6"
              flood-color="#3B82F6"
              flood-opacity="0.5"
            />
          </filter>

          <clipPath id="screen-clip">
            <rect width="400" height="850" rx="45" />
          </clipPath>

          <!-- Map Grids -->
          <pattern
            id="grid-light"
            width="40"
            height="40"
            patternUnits="userSpaceOnUse"
          >
            <path
              d="M 40 0 L 0 0 0 40"
              fill="none"
              stroke="#E2E8F0"
              stroke-width="0.5"
            />
          </pattern>
          <pattern
            id="grid-dark"
            width="40"
            height="40"
            patternUnits="userSpaceOnUse"
          >
            <path
              d="M 40 0 L 0 0 0 40"
              fill="none"
              stroke="#1E293B"
              stroke-width="0.5"
            />
          </pattern>
        </defs>

        <!-- ========================================== -->
        <!-- LIGHT MODE: IDLE STATE (LEFT)              -->
        <!-- ========================================== -->
        <g transform="translate(0, 0)">
          <rect
            width="400"
            height="850"
            rx="45"
            fill="#F8FAFC"
            stroke="#FFFFFF"
            stroke-width="8"
          />

          <g clip-path="url(#screen-clip)">
            <rect width="400" height="850" fill="#F8FAFC" />
            <rect width="400" height="850" fill="url(#grid-light)" />

            <!-- Faux Roads -->
            <path
              d="M-50 200 Q 150 250 200 400 T 450 600"
              fill="none"
              stroke="#FFFFFF"
              stroke-width="24"
              stroke-linecap="round"
            />
            <path
              d="M100 -50 Q 120 300 300 450 T 450 800"
              fill="none"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
            />

            <!-- Marker -->
            <circle
              cx="230"
              cy="410"
              r="30"
              fill="#3B82F6"
              fill-opacity="0.15"
            />
            <circle
              cx="230"
              cy="410"
              r="10"
              fill="#FFFFFF"
              filter="url(#glow-marker)"
            />
            <circle cx="230" cy="410" r="5" fill="#3B82F6" />

            <!-- Top Status Bar -->
            <text
              x="35"
              y="40"
              font-family="sans-serif"
              font-size="14"
              font-weight="600"
              fill="#0F172A"
            >
              9:41
            </text>
            <rect
              x="330"
              y="28"
              width="22"
              height="11"
              rx="3"
              fill="none"
              stroke="#0F172A"
              stroke-width="1.5"
            />
            <rect
              x="332"
              y="30"
              width="18"
              height="7"
              rx="1.5"
              fill="#0F172A"
            />

            <!-- NEW FLOATING TOP WIDGETS (No more search bar) -->
            <!-- Left: User Avatar Button -->
            <circle
              cx="50"
              cy="80"
              r="24"
              fill="#FFFFFF"
              filter="url(#shadow-widget)"
            />
            <circle cx="50" cy="80" r="20" fill="#F1F5F9" />
            <path
              d="M50 76 A 5 5 0 1 0 50 66 A 5 5 0 1 0 50 76 Z M40 90 Q 50 80 60 90"
              fill="none"
              stroke="#64748B"
              stroke-width="2.5"
              stroke-linecap="round"
            />

            <!-- Right: GPS Status Pill -->
            <rect
              x="290"
              y="62"
              width="80"
              height="36"
              rx="18"
              fill="#FFFFFF"
              filter="url(#shadow-widget)"
            />
            <circle cx="310" cy="80" r="4" fill="#10B981" />
            <text
              x="322"
              y="84"
              font-family="sans-serif"
              font-size="12"
              font-weight="700"
              fill="#64748B"
              letter-spacing="0.5"
            >
              GPS
            </text>

            <!-- IDLE LOTTIE ANIMATION PLACEHOLDER (Character stretching) -->
            <g transform="translate(160, 410)">
              <!-- Shadow -->
              <ellipse
                cx="40"
                cy="120"
                rx="30"
                ry="6"
                fill="#000000"
                fill-opacity="0.1"
              />
              <!-- Legs -->
              <path
                d="M 30 115 L 35 80 L 45 80 L 55 115"
                fill="none"
                stroke="#64748B"
                stroke-width="12"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M 23 118 L 33 115 M 48 115 L 62 118"
                fill="none"
                stroke="#10B981"
                stroke-width="8"
                stroke-linecap="round"
              />
              <!-- Torso -->
              <path
                d="M 40 80 L 40 40"
                fill="none"
                stroke="#0F172A"
                stroke-width="22"
                stroke-linecap="round"
              />
              <!-- Arms Stretching Up -->
              <path
                d="M 32 45 Q 15 30 25 10 M 48 45 Q 65 30 55 10"
                fill="none"
                stroke="#FCD34D"
                stroke-width="8"
                stroke-linecap="round"
              />
              <!-- Head -->
              <circle cx="40" cy="20" r="14" fill="#FCD34D" />
              <!-- Hair -->
              <path d="M 25 20 Q 40 0 55 20 Q 40 5 25 20 Z" fill="#0F172A" />
            </g>

            <!-- Bottom Card -->
            <rect
              x="0"
              y="540"
              width="400"
              height="310"
              rx="40"
              fill="#FFFFFF"
              filter="url(#shadow-card)"
            />
            <rect
              x="175"
              y="555"
              width="50"
              height="5"
              rx="2.5"
              fill="#E2E8F0"
            />

            <text
              x="30"
              y="605"
              font-family="sans-serif"
              font-size="26"
              font-weight="800"
              fill="#0F172A"
            >
              Ready to run
            </text>

            <g transform="translate(30, 620)">
              <path
                d="M 6 0 C 2.7 0 0 2.7 0 6 C 0 10.5 6 16 6 16 C 6 16 12 10.5 12 6 C 12 2.7 9.3 0 6 0 Z M 6 8 C 4.9 8 4 7.1 4 6 C 4 4.9 4.9 4 6 4 C 7.1 4 8 4.9 8 6 C 8 7.1 7.1 8 6 8 Z"
                fill="#3B82F6"
              />
              <text
                x="18"
                y="12"
                font-family="sans-serif"
                font-size="14"
                font-weight="600"
                fill="#64748B"
              >
                Central Park, New York
              </text>
            </g>

            <!-- Start Button -->
            <rect
              x="30"
              y="660"
              width="340"
              height="70"
              rx="35"
              fill="#10B981"
              filter="url(#shadow-btn)"
            />
            <path d="M 135 685 L 135 705 L 150 695 Z" fill="#FFFFFF" />
            <text
              x="160"
              y="702"
              font-family="sans-serif"
              font-size="20"
              font-weight="800"
              fill="#FFFFFF"
              letter-spacing="1"
            >
              START RUN
            </text>

            <rect x="0" y="760" width="400" height="1" fill="#F1F5F9" />

            <!-- iOS Home Indicator -->
            <rect
              x="130"
              y="835"
              width="140"
              height="5"
              rx="2.5"
              fill="#0F172A"
            />
          </g>
        </g>

        <!-- ========================================== -->
        <!-- DARK MODE: EXHAUSTED/PAUSED STATE (RIGHT)  -->
        <!-- ========================================== -->
        <g transform="translate(450, 0)">
          <rect
            width="400"
            height="850"
            rx="45"
            fill="#0B1120"
            stroke="#1E293B"
            stroke-width="8"
          />

          <g clip-path="url(#screen-clip)">
            <rect width="400" height="850" fill="#0B1120" />
            <rect width="400" height="850" fill="url(#grid-dark)" />

            <path
              d="M-50 200 Q 150 250 200 400 T 450 600"
              fill="none"
              stroke="#1E293B"
              stroke-width="24"
              stroke-linecap="round"
            />
            <path
              d="M100 -50 Q 120 300 300 450 T 450 800"
              fill="none"
              stroke="#1E293B"
              stroke-width="18"
              stroke-linecap="round"
            />

            <!-- Route Drawn -->
            <path
              d="M100 -50 Q 120 300 230 410"
              fill="none"
              stroke="#06B6D4"
              stroke-width="8"
              stroke-linecap="round"
            />

            <!-- Marker -->
            <circle
              cx="230"
              cy="410"
              r="10"
              fill="#0B1120"
              stroke="#06B6D4"
              stroke-width="4"
            />

            <!-- Top Status Bar -->
            <text
              x="35"
              y="40"
              font-family="sans-serif"
              font-size="14"
              font-weight="600"
              fill="#F8FAFC"
            >
              9:41
            </text>
            <rect
              x="330"
              y="28"
              width="22"
              height="11"
              rx="3"
              fill="none"
              stroke="#F8FAFC"
              stroke-width="1.5"
            />
            <rect
              x="332"
              y="30"
              width="18"
              height="7"
              rx="1.5"
              fill="#F8FAFC"
            />

            <!-- NEW FLOATING TOP WIDGETS (Dark Mode) -->
            <circle
              cx="50"
              cy="80"
              r="24"
              fill="#1E293B"
              filter="url(#shadow-widget-dark)"
            />
            <circle cx="50" cy="80" r="20" fill="#334155" />
            <path
              d="M50 76 A 5 5 0 1 0 50 66 A 5 5 0 1 0 50 76 Z M40 90 Q 50 80 60 90"
              fill="none"
              stroke="#94A3B8"
              stroke-width="2.5"
              stroke-linecap="round"
            />

            <rect
              x="290"
              y="62"
              width="80"
              height="36"
              rx="18"
              fill="#1E293B"
              filter="url(#shadow-widget-dark)"
            />
            <circle cx="310" cy="80" r="4" fill="#059669" />
            <text
              x="322"
              y="84"
              font-family="sans-serif"
              font-size="12"
              font-weight="700"
              fill="#94A3B8"
              letter-spacing="0.5"
            >
              GPS
            </text>

            <!-- EXHAUSTED LOTTIE ANIMATION (Based on your image) -->
            <g transform="translate(160, 360)">
              <!-- Shadow -->
              <ellipse
                cx="40"
                cy="120"
                rx="35"
                ry="6"
                fill="#000000"
                fill-opacity="0.3"
              />

              <!-- Bent Legs -->
              <path
                d="M 25 115 L 35 75 L 45 65"
                fill="none"
                stroke="#0F172A"
                stroke-width="14"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M 55 115 L 45 75 L 45 65"
                fill="none"
                stroke="#0F172A"
                stroke-width="14"
                stroke-linecap="round"
                stroke-linejoin="round"
              />

              <!-- Shoes -->
              <path
                d="M 15 118 L 30 115 M 48 115 L 65 118"
                fill="none"
                stroke="#06B6D4"
                stroke-width="8"
                stroke-linecap="round"
              />

              <!-- Bent Torso -->
              <path
                d="M 45 65 Q 25 50 30 30"
                fill="none"
                stroke="#06B6D4"
                stroke-width="26"
                stroke-linecap="round"
              />

              <!-- Arms resting on knees -->
              <path
                d="M 30 35 L 20 60 L 30 75"
                fill="none"
                stroke="#FDE68A"
                stroke-width="8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M 35 35 L 45 60 L 40 75"
                fill="none"
                stroke="#FDE68A"
                stroke-width="8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />

              <!-- Head looking down -->
              <circle cx="20" cy="20" r="14" fill="#FDE68A" />
              <path d="M 10 20 Q 20 5 30 20" fill="#0F172A" />
              <!-- Hair -->

              <!-- Breathing Puff (Like the sketch!) -->
              <path
                d="M -5 20 Q -10 15 -15 20 T -25 20"
                fill="none"
                stroke="#94A3B8"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M -5 25 Q -10 20 -15 25 T -20 25"
                fill="none"
                stroke="#94A3B8"
                stroke-width="2"
                stroke-linecap="round"
              />

              <!-- Sweat drops -->
              <circle cx="15" cy="40" r="2" fill="#06B6D4" />
              <circle cx="22" cy="45" r="1.5" fill="#06B6D4" />
            </g>

            <!-- Bottom Card (PAUSED STATE) -->
            <rect
              x="0"
              y="490"
              width="400"
              height="360"
              rx="40"
              fill="#1E293B"
              filter="url(#shadow-card-dark)"
            />
            <rect
              x="175"
              y="505"
              width="50"
              height="5"
              rx="2.5"
              fill="#334155"
            />

            <text
              x="145"
              y="550"
              font-family="sans-serif"
              font-size="26"
              font-weight="800"
              fill="#F8FAFC"
            >
              Paused
            </text>
            <text
              x="135"
              y="575"
              font-family="sans-serif"
              font-size="14"
              font-weight="600"
              fill="#94A3B8"
            >
              TAKE A BREATHER
            </text>

            <!-- Live Stats Display -->
            <g transform="translate(40, 610)">
              <!-- Time -->
              <text
                x="0"
                y="0"
                font-family="monospace"
                font-size="36"
                font-weight="700"
                fill="#F8FAFC"
              >
                14:32
              </text>
              <text
                x="0"
                y="20"
                font-family="sans-serif"
                font-size="12"
                font-weight="600"
                fill="#94A3B8"
                letter-spacing="1"
              >
                TIME
              </text>

              <!-- Distance -->
              <text
                x="180"
                y="0"
                font-family="monospace"
                font-size="36"
                font-weight="700"
                fill="#06B6D4"
              >
                2.45
              </text>
              <text
                x="180"
                y="20"
                font-family="sans-serif"
                font-size="12"
                font-weight="600"
                fill="#94A3B8"
                letter-spacing="1"
              >
                KILOMETERS
              </text>
            </g>

            <!-- Pause/Stop Action Buttons -->
            <!-- Resume (Green) -->
            <circle
              cx="120"
              cy="730"
              r="35"
              fill="#059669"
              filter="url(#shadow-btn)"
            />
            <path d="M 112 715 L 112 745 L 135 730 Z" fill="#FFFFFF" />
            <text
              x="93"
              y="790"
              font-family="sans-serif"
              font-size="14"
              font-weight="700"
              fill="#F8FAFC"
            >
              Resume
            </text>

            <!-- Stop (Red) -->
            <circle
              cx="280"
              cy="730"
              r="35"
              fill="#DC2626"
              filter="url(#shadow-btn-danger)"
            />
            <rect
              x="268"
              y="718"
              width="24"
              height="24"
              rx="4"
              fill="#FFFFFF"
            />
            <text
              x="262"
              y="790"
              font-family="sans-serif"
              font-size="14"
              font-weight="700"
              fill="#F8FAFC"
            >
              Finish
            </text>

            <rect
              x="130"
              y="835"
              width="140"
              height="5"
              rx="2.5"
              fill="#F8FAFC"
            />
          </g>
        </g>
      </svg>
    </div>
  </body>
</html>
